<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZenAR</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <!-- AR.js (pinned stable version) -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

    <script>
      // Forward markerFound/markerLost events to React via window CustomEvents
      AFRAME.registerComponent("marker-handler", {
        init: function () {
          this.el.addEventListener("markerFound", () => {
            window.dispatchEvent(
              new CustomEvent("zenar-marker-found", { detail: { id: this.el.id } })
            );
          });
          this.el.addEventListener("markerLost", () => {
            window.dispatchEvent(
              new CustomEvent("zenar-marker-lost", { detail: { id: this.el.id } })
            );
          });
        },
      });
    </script>
    <script type="module" crossorigin src="/zenar-ar/assets/index-BaxAPWeW.js"></script>
    <link rel="stylesheet" crossorigin href="/zenar-ar/assets/index-BjheR3Yj.css">
  </head>

  <body>
    <div id="root"></div>
  </body>
</html>
